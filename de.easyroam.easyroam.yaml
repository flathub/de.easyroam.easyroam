id: de.easyroam.easyroam
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: easyroam
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --system-talk-name=org.freedesktop.NetworkManager

modules:
  - shared-modules/lzo/lzo.json
  - shared-modules/squashfs-tools/squashfs-tools.json

  - name: libndp
    buildsystem: autotools
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://github.com/jpirko/libndp/archive/v1.9.tar.gz
        sha256: e564f5914a6b1b799c3afa64c258824a801c1b79a29e2fe6525b682249c65261
        x-checker-data:
          type: anitya
          project-id: 14944
          stable-only: true
          url-template: https://github.com/jpirko/libndp/archive/v$version.tar.gz
  # https://github.com/flathub/org.gnome.NetworkDisplays/blob/37f11973af1c6335d08bbf78beb737a48ca94f39/files/NetworkManager/NetworkManager.json#L27-L67
  - name: NetworkManager
    buildsystem: meson
    build-options:
      cflags: -ltinfo
      cxxflags: -ltinfo
    config-opts:
      - -Dsystemdsystemunitdir=no
      - -Ddbus_conf_dir=/app/etc/dbus-1/system.d
      - -Diptables=/usr/bin/true
      - -Ddnsmasq=/usr/bin/true
      - -Dsession_tracking=no
      - -Dselinux=false
      - -Dsystemd_journal=false
      - -Dlibaudit=no
      - -Dwext=false
      - -Dwifi=true
      - -Dppp=false
      - -Dmodem_manager=false
      - -Dovs=false
      - -Dnmcli=false
      - -Dnmtui=false
      - -Dintrospection=false
      - -Dvapi=false
      - -Ddocs=false
      - -Dtests=no
      - -Dfirewalld_zone=false
      - -Dlibpsl=false
      - -Dqt=false
      - -Dnm_cloud_setup=false
      - -Dnbft=false
      - -Dman=false
    cleanup:
      - /bin
      - /etc
      - /include
      - /lib/pkgconfig
      - /libexec
      - /sbin
      - /var
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/NetworkManager/NetworkManager.git
        tag: 1.56.0
        commit: 56b51b98fbb8627c4c09a483702e18fd8aee7ce1
        x-checker-data:
          type: git
          tag-pattern: ^([\\d.]+)$

  - name: easyroam-connect-desktop
    buildsystem: simple
    build-commands:
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 ${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 ${FLATPAK_ID}.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png
      - ln -s ${FLATPAK_DEST}/extra/snap/easyroam_connect_desktop ${FLATPAK_DEST}/bin/easyroam
      - install -Dm755 apply_extra ${FLATPAK_DEST}/bin/apply_extra
    sources:
      - type: extra-data
        filename: easyroam.snap
        only-arches:
          - x86_64
        url: https://api.snapcraft.io/api/v1/snaps/download/K39hKMJWqabSZF9YQ99cdPULXDsUDyXb_1.snap
        sha256: 886f64607e510d2c418a9263319d6b49f1b229c72789046bf1332c1356e983bb
        size: 38699008
        x-checker-data:
          type: snapcraft
          name: easyroam
          channel: stable
          is-main-source: true
      - type: file
        path: de.easyroam.easyroam.metainfo.xml
      - type: file
        path: de.easyroam.easyroam.desktop
      - type: file
        path: de.easyroam.easyroam.png
      - type: script
        dest-filename: apply_extra
        commands:
          - unsquashfs -quiet -no-progress easyroam.snap
          # TODO: Remove unused files from snap
          - mkdir snap
          - mv squashfs-root/* snap/
          - rm -r squashfs-root easyroam.snap